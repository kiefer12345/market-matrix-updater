name: Update Market Matrix

on:
  schedule:
    # 每天 UTC 22:00 运行 (悉尼时间早上9点)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 允许写入仓库
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install yfinance pandas requests
    
    - name: Run update script
      env:
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      run: |
        python market_matrix_updater.py
    
    - name: Commit and push data.json to main
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data.json
        git diff --staged --quiet || git commit -m "Update market data $(date +'%Y-%m-%d %H:%M UTC')"
        git push

    - name: Deploy to gh-pages
      run: |
        git fetch origin gh-pages
        git checkout gh-pages
        git checkout main -- data.json index.html
        git add data.json index.html
        git diff --staged --quiet || git commit -m "Deploy $(date -u +'%Y-%m-%d %H:%M UTC')"
        git push origin gh-pages
    
    - name: Log completion
      run: |
        echo "✅ Market matrix update completed at $(date)"
        echo "📊 Data saved to data.json"
        echo "📝 Notion database updated"
